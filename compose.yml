services:
  open-questions:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PREINSTALL_MCP_SERVERS: "true"
    image: ghcr.io/geoffsee/open-questions:latest
    init: true
    restart: unless-stopped
    ports:
      - "3030:3030"
      - "3031:3031"
      - "3032:3032"
      - "3040:3040"
    env_file:
      - path: .env.open-questions
        required: false
    volumes:
      - ./.github:/workspace/.github:ro
      - action-data:/data

volumes:
  action-data:
