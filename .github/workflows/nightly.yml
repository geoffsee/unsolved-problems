name: Nightly Build & Deploy

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch latest problems from Wikipedia
        run: bun run fetch-data

      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: apps/client/public/data/enrichments.json
          key: enrichments-v1

      - name: Fetch frontier research news
        run: bun run fetch-news
        env:
          PERIGON_API_KEY: ${{ secrets.PERIGON_API_KEY }}

      - name: Enrich problems with AI
        run: bun run enrich-data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
