name: Nightly Build & Deploy

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Rotates every 23 hours — floor(epoch_seconds / 82800)
  CACHE_EPOCH: ${{ github.run_id }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Compute cache key
        id: cache-key
        run: echo "epoch=$(( $(date +%s) / 82800 ))" >> "$GITHUB_OUTPUT"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            apps/client/public/data/problems.json
            apps/client/public/data/news.json
            apps/client/public/data/enrichments.json
          key: data-${{ steps.cache-key.outputs.epoch }}
          restore-keys: data-

      - name: Fetch latest problems from Wikipedia
        run: |
          if [ -f public/data/problems.json ]; then
            echo "Using cached problems.json"
          else
            bun run fetch-data
          fi

      - name: Fetch frontier research news
        run: |
          if [ -f public/data/news.json ]; then
            echo "Using cached news.json"
          else
            bun run fetch-news
          fi
        env:
          PERIGON_API_KEY: ${{ secrets.PERIGON_API_KEY }}

      - name: Enrich problems with AI
        run: bun run enrich-data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Compress data files
        run: bun run compress-data

      - name: Build
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
