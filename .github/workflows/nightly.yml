name: Nightly Build & Deploy

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            apps/client/public/data/manifest.json
            apps/client/public/data/problems.json
            apps/client/public/data/news.json
            apps/client/public/data/news-history
            apps/client/public/data/cases.json
            apps/client/public/data/case-history
          key: data-${{ github.run_id }}
          restore-keys: data-

      - name: Refresh data and build client
        uses: ./.github/actions/nightly
        env:
          PERIGON_API_KEY: ${{ secrets.PERIGON_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Save data cache
        uses: actions/cache/save@v4
        with:
          path: |
            apps/client/public/data/manifest.json
            apps/client/public/data/problems.json
            apps/client/public/data/news.json
            apps/client/public/data/news-history
            apps/client/public/data/cases.json
            apps/client/public/data/case-history
          key: data-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
