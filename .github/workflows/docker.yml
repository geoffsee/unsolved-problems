name: Docker

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI for act
        if: ${{ env.ACT }}
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends curl docker.io

      - name: Build image
        run: docker build --tag open-questions:${{ github.sha }} .

      - name: Start container
        run: docker run --detach --rm --name open-questions --publish 8080:8080 open-questions:${{ github.sha }}

      - name: Smoke test
        run: |
          for attempt in $(seq 1 15); do
            if curl --fail --silent --show-error http://127.0.0.1:8080/ | grep --quiet '<div id="root">' && \
              curl --fail --silent --show-error http://127.0.0.1:8080/api/health | grep --quiet '"ok":true'; then
              exit 0
            fi
            sleep 1
          done
          docker logs open-questions
          exit 1

      - name: Stop container
        if: always()
        run: docker stop open-questions || true
