name: Morning Agent Contribution

on:
  schedule:
    # 08:45 America/New_York — GitHub cron is UTC-only, so cover EST and EDT
    - cron: "45 12 * * *" # 08:45 EDT (UTC-4)
    - cron: "45 13 * * *" # 08:45 EST (UTC-5)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/example
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Make morning contribution
        uses: ./.github/actions/morning-contribution
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          api-token: ${{ secrets.OPEN_QUESTIONS_API_TOKEN }}
          openalex-mailto: ${{ secrets.OPENALEX_MAILTO }}
          openalex-api-key: ${{ secrets.OPENALEX_API_KEY }}
          searxng-url: ${{ secrets.SEARXNG_URL }}
