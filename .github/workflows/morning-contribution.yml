name: Morning Agent Contribution

on:
  schedule:
    # 08:45 America/New_York — GitHub cron is UTC-only, so cover EST and EDT
    - cron: "45 12 * * *" # 08:45 EDT (UTC-4)
    - cron: "45 13 * * *" # 08:45 EST (UTC-5)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/example
    steps:
      - name: Confirm Eastern Time window
        if: github.event_name == 'schedule'
        run: |
          eastern="$(TZ=America/New_York date '+%H:%M')"
          hour="${eastern%%:*}"
          minute="${eastern##*:}"
          # Tolerate Actions schedule drift around 08:45 Eastern
          if [ "$hour" != "08" ] || [ "$minute" -lt 40 ] || [ "$minute" -gt 55 ]; then
            echo "Skipping: Eastern time is $eastern (want ~08:45)."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "Running at Eastern $eastern"
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.skip != 'true'

      - uses: oven-sh/setup-bun@v2
        if: env.skip != 'true'

      - name: Install dependencies
        if: env.skip != 'true'
        run: bun install && bunx playwright install --with-deps chromium

      - name: Claim a problem and save a contribution
        if: env.skip != 'true'
        run: bun run start:anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSOLVED_MCP_URL: https://unsolved-problems-api.seemueller.workers.dev/mcp
          UNSOLVED_AGENT_ID: github-actions-morning
          UNSOLVED_PICK_MODE: random
          ANTHROPIC_MODEL: claude-sonnet-4-5
          # Expanded into the committed apps/example/.mcp.json via ${VAR} references.
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
